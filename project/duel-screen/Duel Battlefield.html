<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shandalar Modern · Duel Battlefield</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body, #root { height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; }
    body {
      background: #050302;
      color: #e8dcb0;
      font-family: 'Crimson Text', serif;
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #080502; }
    ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #5a4020, #3a2810); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #7a5830; }

    button { font-family: 'Cinzel', serif; }

    @keyframes pulse {
      0%, 100% { opacity: .8; transform: scale(1); }
      50%      { opacity: 1; transform: scale(1.04); }
    }
    @keyframes damageFlash {
      0%   { filter: none; transform: translateX(0); }
      20%  { filter: brightness(2.5) saturate(.2); transform: translateX(-3px); }
      60%  { transform: translateX(2px); }
      100% { filter: none; transform: translateX(0); }
    }
    @keyframes healFlash {
      0%, 100% { filter: none; transform: scale(1); }
      50%       { filter: brightness(1.5) hue-rotate(100deg); transform: scale(1.05); }
    }
    @keyframes phaseGlow {
      0%, 100% { box-shadow: 0 0 8px rgba(196,160,64,.5); }
      50%       { box-shadow: 0 0 16px rgba(196,160,64,.9); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="components/cards.jsx"></script>
  <script type="text/babel" src="components/panels.jsx"></script>
  <script type="text/babel" src="components/targetArrow.jsx"></script>
  <script type="text/babel" src="components/duelScreen.jsx"></script>
  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<DuelScreen />);
  </script>
</body>
</html>
